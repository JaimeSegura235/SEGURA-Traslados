<!-- Reemplaza tu formulario actual con este código completo -->

<form action="https://formspree.io/f/xxxxxxx" method="POST" class="reservation-form">
  
  <!-- Campos ocultos para Formspree -->
  <input type="hidden" name="_subject" value="🚗 Nueva reservación - SEGURA Traslados">
  <input type="hidden" name="_autoresponse" value="¡Gracias por reservar con SEGURA Traslados! ✅ Hemos recibido tu solicitud de traslado. En breve te contactaremos vía WhatsApp o correo para confirmar los detalles de tu servicio. Si necesitas ayuda inmediata, escríbenos al +52 81 13 725 342. — Equipo SEGURA Traslados">
  <input type="hidden" name="_template" value="table">
  
  <div class="form-row">
    <div class="form-group">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
    </div>
    <div class="form-group">
      <label for="telefono">Teléfono</label>
      <input type="tel" id="telefono" name="telefono" placeholder="Teléfono" required>
    </div>
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group full-width">
      <label for="origen">Origen</label>
      <div class="location-selector">
        <button type="button" class="location-btn active" onclick="toggleLocation('airport')">✈ Aeropuerto Mariano Escobedo</button>
        <button type="button" class="location-btn" onclick="toggleLocation('address')">＋ Agregar dirección</button>
      </div>
      <input type="text" id="origen-detail" name="origen_detalle" class="address-input" placeholder="Dirección de origen (detalle)" style="display: none;">
      <small class="help-text">Escribe la dirección completa o referencia de tu punto de partida.</small>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group full-width">
      <label for="destino">Destino</label>
      <select id="destino" name="destino" required>
        <option value="">Selecciona tu destino...</option>
        <option value="zona-hotelera" data-price="650">Zona Hotelera — 650 MXN</option>
        <option value="monterrey" data-price="600">Monterrey — 600 MXN</option>
        <option value="san-pedro" data-price="650">San Pedro Garza García — 650 MXN</option>
        <option value="san-nicolas" data-price="600">San Nicolás — 600 MXN</option>
        <option value="santa-catarina" data-price="600">Sta. Catarina / C. Nacional / Mitras Pte. — 600 MXN</option>
        <option value="apodaca" data-price="650">Apodaca — 650 MXN</option>
        <option value="guadalupe" data-price="650">Guadalupe — 650 MXN</option>
        <option value="escobedo" data-price="600">Escobedo — 600 MXN</option>
        <option value="juarez" data-price="600">Juárez — 600 MXN</option>
        <option value="periferica" data-price="1,000">Zona Periférica (García, Zuazua, Salinas V.) — 1,000 MXN</option>
        <option value="saltillo" data-price="1,700">Saltillo — 1,700 MXN (+300 casetas)</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Tipo de vehículo</label>
      <div class="vehicle-options">
        <label class="vehicle-option">
          <input type="radio" name="vehiculo" value="Sedan Ejecutivo" required>
          <span class="vehicle-card">
            <span class="vehicle-name">Sedan Ejecutivo</span>
            <span class="vehicle-price">Desde $600</span>
          </span>
        </label>
        <label class="vehicle-option">
          <input type="radio" name="vehiculo" value="SUV">
          <span class="vehicle-card">
            <span class="vehicle-name">SUV</span>
            <span class="vehicle-price">Desde $750</span>
          </span>
        </label>
        <label class="vehicle-option">
          <input type="radio" name="vehiculo" value="Van">
          <span class="vehicle-card">
            <span class="vehicle-name">Van</span>
            <span class="vehicle-price">Desde $1,200</span>
          </span>
        </label>
        <label class="vehicle-option">
          <input type="radio" name="vehiculo" value="Suburban">
          <span class="vehicle-card premium">
            <span class="vehicle-name">Suburban</span>
            <span class="vehicle-price">Desde $1,500</span>
          </span>
        </label>
      </div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="fecha">Fecha y hora</label>
      <input type="datetime-local" id="fecha" name="fecha" required>
    </div>
    <div class="form-group">
      <label for="pasajeros">Pasajeros</label>
      <select id="pasajeros" name="pasajeros">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
      </select>
    </div>
    <div class="form-group">
      <label for="maletas">Maletas</label>
      <select id="maletas" name="maletas">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5+">5+</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group full-width">
      <label for="notas">Notas especiales</label>
      <textarea id="notas" name="notas" rows="3" placeholder="¿Alguna solicitud especial? (silla infantil, asistencia especial, etc.)"></textarea>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group full-width">
      <label>Método de pago</label>
      <div class="payment-methods">
        <label class="payment-method">
          <input type="radio" name="pago" value="Tarjeta (Stripe)" required>
          <span>💳 Tarjeta (Stripe)</span>
        </label>
        <label class="payment-method">
          <input type="radio" name="pago" value="Mercado Pago">
          <span>🏪 Mercado Pago</span>
        </label>
        <label class="payment-method">
          <input type="radio" name="pago" value="Apple Pay">
          <span>🍎 Apple Pay</span>
        </label>
        <label class="payment-method">
          <input type="radio" name="pago" value="Google Pay">
          <span>🤖 Google Pay</span>
        </label>
        <label class="payment-method">
          <input type="radio" name="pago" value="SPEI / Transferencia">
          <span>🏦 SPEI / Transferencia</span>
        </label>
      </div>
    </div>
  </div>

  <button type="submit" class="submit-btn">
    ✓   Confirmar reserva y proceder al pago
  </button>
</form>
